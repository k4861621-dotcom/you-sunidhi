<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sun 💕</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        text-align: center;
        color: #fff;
    }

    .container {
        margin-top: 80px;
    }

    h1 {
        font-size: 40px;
    }

    p {
        font-size: 20px;
    }

    img {
        width: 200px;
        border-radius: 20px;
        margin: 20px;
    }

    .btn {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #yesBtn {
        background-color: #ff4d6d;
        color: white;
    }

    #noBtn {
        background-color: #444;
        color: white;
        position: absolute;
    }

    #message {
        font-size: 28px;
        margin-top: 30px;
        display: none;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sunidhi 💖</h1>
    <p>I have something special to ask you... 🥺</p>

    <!-- Cute Cat Image -->
    <img src="https://i.imgur.com/JQ9pRoD.png" alt="Cute Cat">

    <h2>Will you be mine forever? 💕</h2>

    <button class="btn" id="yesBtn">Yes 💖</button>
    <button class="btn" id="noBtn">No 😢</button>

    <div id="message">Yayyyy!! I knew it 😍💕</div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const message = document.getElementById("message");

// YES BUTTON
yesBtn.onclick = function() {
    message.style.display = "block";
}

// NO BUTTON (runs away + auto yes 😏)
noBtn.onmouseover = function() {
    const x = Math.random() * window.innerWidth - 100;
    const y = Math.random() * window.innerHeight - 100;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

// If somehow clicked NO → still YES 😂
noBtn.onclick = function() {
    message.innerHTML = "Nice try 😏 but it's YES only 💖";
    message.style.display = "block";
}
</script>

</body>
</html>
